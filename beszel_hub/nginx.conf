worker_processes 1;
error_log /dev/stderr warn;
pid /run/nginx.pid;

events { worker_connections 1024; }

http {
    access_log off;
    sendfile on;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8090;   # primy LAN pristup (http://<IP>:8090)
        listen 8099;   # HA ingress (ingress_port)

        location / {
            proxy_pass http://127.0.0.1:8091;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket / SSE (Beszel live update)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_read_timeout 3600s;

            # Vypnout upstream kompresi, aby sub_filter videl plain HTML
            proxy_set_header Accept-Encoding "";

            # Iframe embed (LAN Webpage dashboard): strhnout blokujici hlavicku
            proxy_hide_header X-Frame-Options;
            add_header Content-Security-Policy "frame-ancestors *" always;

            # INGRESS: prepsat absolutni cesty na ingress prefix z hlavicky
            # X-Ingress-Path (HA ji posila). Pri primem LAN pristupu je hlavicka
            # prazdna => prefix "" => cesty zustanou root (funguje oboje).
            sub_filter_once off;
            sub_filter_types text/html;
            sub_filter 'BASE_PATH: "/"'  'BASE_PATH: "$http_x_ingress_path/"';
            sub_filter 'href="/'          'href="$http_x_ingress_path/';
            sub_filter 'src="/'           'src="$http_x_ingress_path/';
        }
    }
}
